<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e040fb;
      --accent2: #7c4dff;
      --text: #f0f0f0;
      --text-dim: #999;
      --success: #69f0ae;
      --border: #2a2a4a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding: 0;
      overscroll-behavior: none;
    }

    /* ── 主畫面 ── */
    #main-screen { display: none; flex-direction: column; min-height: 100dvh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 10px;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── 翻譯區塊 ── */
    .translation-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .input-area {
      position: relative;
      padding: 14px;
    }

    textarea {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1.5;
      min-height: 60px;
      max-height: 45vh;
      overflow-y: auto;
      outline: none;
      resize: none;
      width: 100%;
    }
    textarea::placeholder { color: var(--text-dim); }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 14px 14px;
    }

    .btn-mic {
      align-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      font-size: 1.4rem;
      height: 52px;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.2s;
      width: 52px;
      flex-shrink: 0;
    }
    .btn-mic.listening {
      animation: pulse 1s infinite;
      box-shadow: 0 0 0 8px rgba(224, 64, 251, 0.2);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .btn-translate {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      flex: 1;
      font-size: 0.95rem;
      padding: 12px;
    }
    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 12px;
    }

    .direction-bar {
      padding: 8px 14px;
      display: flex;
      justify-content: center;
    }
    #direction-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 6px 16px;
      transition: border-color 0.15s, color 0.15s;
    }
    #direction-btn:active { border-color: var(--accent); color: var(--accent); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    .result-area {
      padding: 16px 14px;
      min-height: 80px;
    }
    .result-label {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #result-text {
      color: var(--success);
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.5;
      word-break: break-word;
    }
    #result-text.placeholder { color: var(--text-dim); font-size: 1rem; font-weight: 400; }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 10px;
      padding: 4px 0;
    }
    .copy-btn:active { color: var(--success); }

    /* ── 狀態訊息 ── */
    #status-msg {
      color: var(--accent);
      font-size: 0.85rem;
      min-height: 20px;
      text-align: center;
    }

    /* ── 快捷短語 ── */
    .section-title {
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 14px;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .phrases-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .phrase-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      padding: 12px 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .phrase-card:active {
      background: var(--surface2);
      border-color: var(--accent);
    }
    .phrase-en {
      color: var(--success);
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .phrase-zh {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    /* ── 設定 Modal ── */
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    #settings-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%; max-width: 400px;
    }
    #settings-modal h2 { font-size: 1rem; margin-bottom: 10px; }
    #settings-modal p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 14px; line-height: 1.6; }
    #api-key-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 12px;
      width: 100%;
      outline: none;
      margin-bottom: 14px;
    }
    .settings-actions { display: flex; gap: 8px; }
    .btn-save {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; cursor: pointer;
      flex: 1; font-size: 0.95rem; padding: 12px;
    }
    .btn-cancel {
      background: none; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-dim);
      cursor: pointer; font-size: 0.85rem; padding: 12px;
    }

    /* ── Toast ── */
    #toast {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      bottom: 32px;
      color: var(--text);
      font-size: 0.9rem;
      left: 50%;
      opacity: 0;
      padding: 10px 20px;
      pointer-events: none;
      position: fixed;
      transform: translateX(-50%) translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- 主畫面 -->
<div id="main-screen">
  <header>
    <h1>🏳️‍🌈 Gay Bar 翻譯</h1>
    <button class="btn-icon" onclick="openSettings()">⚙ API Key</button>

      </div>
      <div class="input-actions">
        <button class="btn-mic" id="mic-btn" onclick="toggleMic()" title="語音輸入">🎤</button>

      </div>

        <button class="copy-btn" id="copy-btn" onclick="copyResult()" style="display:none">複製英文 📋</button>
      </div>
    </div>

    <div id="status-msg"></div>

    <!-- 快捷短語 -->
    <div>
      <div class="section-title">常用情境短語（點一下直接顯示）</div>
      <div class="tab-bar" id="tab-bar"></div>
    </div>
    <div class="phrases-grid" id="phrases-grid"></div>

  </div>
</div>

<!-- 設定 Modal -->
<div id="settings-overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div id="settings-modal">
    <h2>Groq API Key 設定</h2>
    <p>到 <strong>console.groq.com</strong> 申請免費 Key，貼在下方：</p>
    <input type="password" id="api-key-input" placeholder="gsk_xxxxxxxxxxxxxxxx" autocomplete="off">
    <div class="settings-actions">
      <button class="btn-save" onclick="saveApiKey()">儲存</button>
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>

    { en: "Are you into guys?", zh: "你喜歡男生嗎？" },

  '角色確認': [
    { en: "Are you a top or bottom?", zh: "你是 1 號還是 0 號？" },
    { en: "I'm a vers bottom.", zh: "我是不分偏 0。" },
    { en: "I'm a strict top.", zh: "我是純 1。" },
    { en: "I'm versatile.", zh: "我不分。" },

    { en: "I'm a sub looking for a Dom.", zh: "我是 sub，在找支配者。" },

    { en: "Do you have a safeword?", zh: "你有安全詞嗎？" },

    { en: "Let's talk about boundaries first.", zh: "我們先聊一下邊界。" },
  ],
  '邀約': [
    { en: "Wanna hook up?", zh: "要約嗎？" },
    { en: "Want to get out of here?", zh: "要離開這裡去別的地方嗎？" },
    { en: "Are you hosting?", zh: "你可以提供場地嗎？" },
    { en: "I'm not hosting tonight.", zh: "我今晚沒辦法提供場地。" },
    { en: "Let's meet up sometime.", zh: "找個時間見面吧。" },
    { en: "Are you on Grindr?", zh: "你有在用 Grindr 嗎？" },
  ],
};

// ────────────────────────────────────────────
// 初始化
// ────────────────────────────────────────────
let currentCategory = Object.keys(PHRASES)[0];
let groqApiKey = localStorage.getItem('groq_api_key') || '';
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let translationMode = 'zh-en'; // 'zh-en' | 'en-zh'

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-screen').style.display = 'flex';
  buildTabs();
  renderPhrases(currentCategory);
  const ta = document.getElementById('input-text');
  ta.addEventListener('input', () => autoResize(ta));
  if (!groqApiKey) openSettings();
});

// ────────────────────────────────────────────
// 術語預處理：先把中文術語換成英文，再送去翻譯
// ────────────────────────────────────────────
function preprocessText(text) {
  let processed = text;
  TERM_MAP.forEach(([zh, en]) => {
    processed = processed.replace(new RegExp(zh, 'g'), en);
  });
  return processed;
}

// ────────────────────────────────────────────
// Google 翻譯（免費，無需 API Key）
// ────────────────────────────────────────────
async function translateNow() {
  const inputEl = document.getElementById('input-text');
  const rawText = inputEl.value.trim();
  if (!rawText) { showToast('請輸入要翻譯的文字'); return; }

  setStatus('翻譯中…');

  const isZhEn = translationMode === 'zh-en';
  const textToTranslate = isZhEn ? preprocessText(rawText) : rawText;
  const sl = isZhEn ? 'zh-TW' : 'en';
  const tl = isZhEn ? 'en' : 'zh-TW';

  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(textToTranslate)}`;
    const response = await fetch(url);

    if (!response.ok) throw new Error(`翻譯失敗（${response.status}）`);

    const data = await response.json();
    const translated = data[0].map(item => item[0]).join('');

    showResult(translated);
    setStatus('');
  } catch (err) {
    setStatus('⚠️ 翻譯失敗，請確認網路是否正常');
  }
}

function showResult(text) {
  const el = document.getElementById('result-text');
  el.textContent = text;
  el.classList.remove('placeholder');
  document.getElementById('copy-btn').style.display = 'block';
}

function clearAll() {
  const ta = document.getElementById('input-text');
  ta.value = '';
  ta.style.height = '60px';
  const el = document.getElementById('result-text');
  el.textContent = '翻譯結果會顯示在這裡';
  el.classList.add('placeholder');
  document.getElementById('copy-btn').style.display = 'none';
  setStatus('');
}

function copyResult() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已複製！'));
}

// ────────────────────────────────────────────
// 語音錄音 + Groq 辨識
// ────────────────────────────────────────────
function toggleMic() {
  if (!groqApiKey) { openSettings(); return; }
  if (isRecording) {
    stopRecording();
  } else {
    const ta = document.getElementById('input-text');
    ta.value = '';
    ta.style.height = '60px';
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const audioBlob = new Blob(audioChunks, { type: mimeType });
      await transcribeWithGroq(audioBlob, mimeType);
    };

    mediaRecorder.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('listening');
    setStatus('🔴 錄音中… 說完再按麥克風停止');
  } catch (err) {
    setStatus('⚠️ 無法使用麥克風，請確認已授權');
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('listening');
    setStatus('辨識中…');
  }
}

async function transcribeWithGroq(audioBlob, mimeType) {
  const ext = mimeType.includes('webm') ? 'webm' : 'mp4';
  const formData = new FormData();
  formData.append('file', audioBlob, `audio.${ext}`);
  const lang = translationMode === 'zh-en' ? 'zh' : 'en';
  const prompt = translationMode === 'zh-en'
    ? 'BDSM, Dom, Sub, vers, bottom, top, Rigger, safeword, 不分, 繩縛, 調教, 臣服者'
    : 'BDSM, Dom, Sub, vers, bottom, top, Rigger, safeword, bondage, collar';
  formData.append('model', 'whisper-large-v3-turbo');
  formData.append('language', lang);
  formData.append('response_format', 'json');
  formData.append('prompt', prompt);

  try {
    const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${groqApiKey}` },
      body: formData
    });

    if (response.status === 401) {
      setStatus('⚠️ API Key 錯誤，請重新設定');
      openSettings();
      return;
    }
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    const inputEl = document.getElementById('input-text');
    inputEl.value = data.text || '';
    autoResize(inputEl);
    setStatus('');
    if (data.text) translateNow();
  } catch (err) {
    setStatus('⚠️ 辨識失敗，請確認網路是否正常');
  }
}

// ────────────────────────────────────────────
// API Key 設定
// ────────────────────────────────────────────
function openSettings() {
  document.getElementById('api-key-input').value = groqApiKey;
  document.getElementById('settings-overlay').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-overlay').style.display = 'none';
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showToast('請輸入 API Key'); return; }
  groqApiKey = key;
  localStorage.setItem('groq_api_key', key);
  closeSettings();
  showToast('API Key 已儲存');
}

// ────────────────────────────────────────────
// 快捷短語
// ────────────────────────────────────────────
function buildTabs() {
  const tabBar = document.getElementById('tab-bar');
  Object.keys(PHRASES).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => switchTab(cat, btn);
    tabBar.appendChild(btn);
  });
}

function switchTab(cat, clickedBtn) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  clickedBtn.classList.add('active');
  renderPhrases(cat);
}

function renderPhrases(cat) {
  const grid = document.getElementById('phrases-grid');
  grid.innerHTML = '';
  PHRASES[cat].forEach(phrase => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `<div class="phrase-en">${phrase.en}</div><div class="phrase-zh">${phrase.zh}</div>`;
    card.onclick = () => usePhrase(phrase.en);
    grid.appendChild(card);
  });
}

function usePhrase(en) {
  showResult(en);
  document.getElementById('input-text').value = '';
  showToast('點擊「複製英文」給對方看');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ────────────────────────────────────────────
// UI 工具
// ────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ────────────────────────────────────────────
// 翻譯方向切換
// ────────────────────────────────────────────
function toggleDirection() {
  translationMode = translationMode === 'zh-en' ? 'en-zh' : 'zh-en';
  updateDirectionUI();
  clearAll();
}

function updateDirectionUI() {
  const isZhEn = translationMode === 'zh-en';
  document.getElementById('direction-btn').innerHTML = isZhEn
    ? '中文 → English &nbsp;⇄'
    : 'English → 中文 &nbsp;⇄';
  document.getElementById('translate-btn').textContent = isZhEn
    ? '翻譯成英文 →'
    : 'Translate to 中文 →';
  document.getElementById('input-text').placeholder = isZhEn
    ? '在這裡輸入中文，或按麥克風說話…'
    : 'Type English here, or tap mic to speak…';
  document.getElementById('result-label').textContent = isZhEn ? 'English' : '中文翻譯';
}

function autoResize(el) {
  el.style.height = 'auto';
  const maxH = Math.round(window.innerHeight * 0.45);
  el.style.height = Math.min(el.scrollHeight, maxH) + 'px';
}

// Enter 鍵觸發翻譯（桌機用）
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) translateNow();
});
</script>
