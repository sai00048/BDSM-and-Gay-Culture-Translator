<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gay Bar 翻譯">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d14">
  <title>Gay Bar 翻譯工具 v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e040fb;
      --accent2: #7c4dff;
      --text: #f0f0f0;
      --text-dim: #888;
      --success: #69f0ae;
      --border: #2a2a4a;
      --danger: #ff5370;
      --half: 50dvh;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ══════════════════════════════
       全螢幕對話布局
    ══════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* 中間分隔線 */
    #divider {
      flex-shrink: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      position: relative;
      z-index: 10;
    }

    /* ── 面板通用 ── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* 上半部（對方那側）：整體顛倒 */
    #panel-top {
      transform: rotate(180deg);
      background: var(--surface2);
    }

    /* 下半部（自己那側） */
    #panel-bottom {
      background: var(--bg);
    }

    /* ── 面板 Header ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
      gap: 8px;
    }

    .lang-selector {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 4px 10px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .lang-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .panel-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── 翻譯結果顯示區 ── */
    .result-display {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 8px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 6px;
      min-height: 0;
    }

    .result-text {
      font-size: 1.25rem;
      font-weight: 500;
      line-height: 1.55;
      word-break: break-word;
      min-height: 48px;
    }

    #top-result { color: var(--success); }
    #bottom-result { color: var(--success); }

    .result-placeholder {
      color: var(--text-dim);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .copy-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 10px;
    }
    .copy-btn:active { color: var(--success); border-color: var(--success); }

    .engine-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      opacity: 0.6;
      margin-left: auto;
    }

    /* settings 分隔線 */
    .settings-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
    .settings-section-title {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* ── 輸入區 ── */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px 10px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
    }

    .input-row textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.45;
      min-height: 42px;
      max-height: 30dvh;
      overflow-y: auto;
      outline: none;
      padding: 10px 12px;
      resize: none;
    }
    .input-row textarea::placeholder { color: var(--text-dim); }

    .btn-mic {
      align-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      font-size: 1.3rem;
      height: 46px;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.2s;
      width: 46px;
      flex-shrink: 0;
    }
    .btn-mic.listening {
      animation: pulse 1s infinite;
      box-shadow: 0 0 0 8px rgba(224, 64, 251, 0.25);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }
    .btn-mic.disabled {
      background: var(--surface);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-translate {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 10px 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 狀態訊息 ── */
    .status-bar {
      min-height: 18px;
      padding: 0 14px 4px;
      font-size: 0.78rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       快捷短語抽屜（下半部內）
    ══════════════════════════════ */
    #phrases-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 6px;
      white-space: nowrap;
    }

    #phrases-drawer {
      display: none;
      flex-direction: column;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-height: 45dvh;
      overflow: hidden;
      flex-shrink: 0;
    }
    #phrases-drawer.open { display: flex; }

    /* ── 常用短語全螢幕模式 ── */
    #app.phrases-mode #panel-top,
    #app.phrases-mode #divider {
      display: none;
    }
    #app.phrases-mode #panel-bottom .result-display,
    #app.phrases-mode #panel-bottom .status-bar,
    #app.phrases-mode #panel-bottom .input-row {
      display: none;
    }
    #app.phrases-mode #phrases-drawer {
      flex: 1;
      max-height: none;
    }

    .tab-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 12px 4px;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .phrases-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 6px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .phrase-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      padding: 9px 12px;
      transition: border-color 0.15s;
    }
    .phrase-card:active { border-color: var(--accent); }

    .phrase-en { color: var(--success); font-size: 0.88rem; font-weight: 500; margin-bottom: 2px; }
    .phrase-zh { color: var(--text-dim); font-size: 0.75rem; }
    .phrase-ja { color: #80cbc4; font-size: 0.75rem; }

    /* ══════════════════════════════
       設定 Modal
    ══════════════════════════════ */
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    #settings-overlay.open { display: flex; }

    #settings-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      width: 100%;
      max-width: 380px;
    }
    #settings-modal h2 { font-size: 1rem; margin-bottom: 8px; }
    #settings-modal p  { color: var(--text-dim); font-size: 0.82rem; margin-bottom: 12px; line-height: 1.6; }

    #api-key-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 11px 12px;
      width: 100%;
      outline: none;
      margin-bottom: 14px;
    }

    .settings-actions { display: flex; gap: 8px; }
    .btn-save {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; cursor: pointer;
      flex: 1; font-size: 0.95rem; padding: 11px;
    }
    .btn-cancel {
      background: none; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-dim);
      cursor: pointer; font-size: 0.85rem; padding: 11px;
    }

    /* ══════════════════════════════
       Toast
    ══════════════════════════════ */
    #toast {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      bottom: 28px;
      color: var(--text);
      font-size: 0.88rem;
      left: 50%;
      opacity: 0;
      padding: 9px 18px;
      pointer-events: none;
      position: fixed;
      transform: translateX(-50%) translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════
       Settings gear button
    ══════════════════════════════ */
    #gear-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══ 上半部（對方那側，顛倒顯示） ═══ -->
  <div class="panel" id="panel-top">

    <!-- 輸入區（顛倒後在視覺上方，實際 DOM 順序放下方以維持 flex 邏輯） -->
    <div class="panel-header">
      <div class="panel-label" id="top-label">對方</div>
      <div class="lang-selector" id="top-langs"></div>
    </div>

    <div class="result-display">
      <div class="result-text result-placeholder" id="top-result">翻譯結果顯示在這裡</div>
      <div class="copy-row" id="top-copy-row" style="display:none">
        <button class="copy-btn" onclick="copyText('top')">複製 📋</button>
        <span class="engine-label" id="top-engine-label"></span>
      </div>
    </div>

    <div class="status-bar" id="top-status"></div>

    <div class="input-row">
      <button class="btn-mic" id="top-mic-btn" onclick="toggleMic('top')" title="語音輸入">🎤</button>
      <textarea id="top-input" placeholder="在這裡輸入，或按麥克風…" oninput="autoResize(this)"></textarea>
      <button class="btn-translate" id="top-translate-btn" onclick="doTranslate('top')">翻譯 →</button>
    </div>

  </div>

  <!-- ═══ 中間分隔線 ═══ -->
  <div id="divider"></div>

  <!-- ═══ 下半部（自己那側） ═══ -->
  <div class="panel" id="panel-bottom">

    <div class="panel-header">
      <div class="lang-selector" id="bottom-langs"></div>
      <div style="display:flex; gap:6px; align-items:center;">
        <button id="phrases-toggle" onclick="togglePhrases()">💬 常用短語</button>
        <div class="panel-label" id="bottom-label">我</div>
        <button id="gear-btn" onclick="openSettings()" title="API Key 設定">⚙️</button>
      </div>
    </div>

    <div class="result-display">
      <div class="result-text result-placeholder" id="bottom-result">翻譯結果顯示在這裡</div>
      <div class="copy-row" id="bottom-copy-row" style="display:none">
        <button class="copy-btn" onclick="copyText('bottom')">複製 📋</button>
        <span class="engine-label" id="bottom-engine-label"></span>
      </div>
    </div>

    <div class="status-bar" id="bottom-status"></div>

    <div class="input-row">
      <button class="btn-mic" id="bottom-mic-btn" onclick="toggleMic('bottom')" title="語音輸入">🎤</button>
      <textarea id="bottom-input" placeholder="在這裡輸入中文，或按麥克風說話…" oninput="autoResize(this)"></textarea>
      <button class="btn-translate" id="bottom-translate-btn" onclick="doTranslate('bottom')">翻譯 →</button>
    </div>

    <!-- 快捷短語抽屜 -->
    <div id="phrases-drawer">
      <div class="tab-bar" id="tab-bar"></div>
      <div class="phrases-list" id="phrases-list"></div>
    </div>

  </div>

</div>

<!-- 設定 Modal -->
<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="settings-modal">
    <h2>API Key 設定</h2>

    <div class="settings-section-title">翻譯引擎（OpenAI）</div>
    <p>到 <strong>platform.openai.com</strong> 取得 Key。有填寫時使用 GPT-4o-mini 翻譯，品質更佳；留空則 fallback 至 Google 翻譯（免費）。</p>
    <input type="password" id="openai-key-input" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">

    <hr class="settings-divider">

    <div class="settings-section-title">語音辨識（Groq Whisper）</div>
    <p>到 <strong>console.groq.com</strong> 免費申請，供麥克風語音辨識使用。</p>
    <input type="password" id="api-key-input" placeholder="gsk_xxxxxxxxxxxxxxxx" autocomplete="off">

    <div class="settings-actions" style="margin-top:14px">
      <button class="btn-save" onclick="saveApiKey()">儲存</button>
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

// ════════════════════════════════════════════════════════
// PWA: inline manifest + service worker
// ════════════════════════════════════════════════════════
(function installPWA() {
  // Manifest
  const manifest = {
    name: 'Gay Bar 翻譯工具',
    short_name: 'GayBar翻譯',
    description: 'BDSM & Gay Culture 即時翻譯，支援繁中/英/日',
    start_url: '.',
    display: 'fullscreen',
    orientation: 'portrait',
    background_color: '#0d0d14',
    theme_color: '#0d0d14',
    icons: [
      { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="%230d0d14"/><text y="130" font-size="120" text-anchor="middle" x="96">🏳️‍🌈</text></svg>', sizes: '192x192', type: 'image/svg+xml' }
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const mUrl  = URL.createObjectURL(mBlob);
  const link  = document.createElement('link');
  link.rel    = 'manifest';
  link.href   = mUrl;
  document.head.appendChild(link);

  // Service Worker (cache-first for offline)
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'gaybar-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.', location.href])));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('groq.com') || e.request.url.includes('googleapis.com')) return;
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }))
  );
});
`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, { scope: './' })
      .catch(() => {}); // 非 HTTPS 環境靜默忽略
  }
})();

// 語境判斷預處理
// ════════════════════════════════════════════════════════
function preprocessText(text, fromLang) {
  let processed = text;
  const map = fromLang === 'zh' ? TERM_MAP_ZH_EN
            : fromLang === 'ja' ? TERM_MAP_JA_EN
            : [];

  map.forEach(([src, tgt, excludePattern]) => {
    // 使用函數型 replace，對每個 match 個別判斷語境
    const srcRegex = new RegExp(src, 'g');
    processed = processed.replace(srcRegex, (match, offset) => {
      if (excludePattern) {
        // 取 match 前後各 6 個字的窗口，判斷是否命中排除模式
        const window = processed.substring(
          Math.max(0, offset - 6),
          Math.min(processed.length, offset + src.length + 6)
        );
        if (excludePattern.test(window)) return match; // 命中排除 → 保留原字
      }
      return tgt;
    });
  });

  return processed;
}

// ── Google Translate fallback ──
async function translateWithGoogle(text, fromLangObj, toLangObj, side, resultSide) {
  const sl = fromLangObj.gtCode;
  const tl = toLangObj.gtCode;

  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data       = await res.json();
    const translated = data[0].map(item => item[0]).join('');
    showResult(resultSide, translated, 'Google Translate');
    setStatus(side, '');
  } catch (err) {
    setStatus(side, '⚠️ 翻譯失敗，請確認網路');
  }
}

function showResult(side, text, engine = '') {
  const el = document.getElementById(`${side}-result`);
  el.textContent = text;
  el.classList.remove('result-placeholder');
  document.getElementById(`${side}-copy-row`).style.display = 'flex';
  const label = document.getElementById(`${side}-engine-label`);
  if (label) label.textContent = engine ? `via ${engine}` : '';
}

function clearSide(side) {
  const inputEl = document.getElementById(`${side}-input`);
  inputEl.value = '';
  inputEl.style.height = '42px';
  const el = document.getElementById(`${side}-result`);
  el.textContent = RESULT_PLACEHOLDER_TEXT[state[side].lang] || '翻譯結果顯示在這裡';
  el.classList.add('result-placeholder');
  document.getElementById(`${side}-copy-row`).style.display = 'none';
  setStatus(side, '');
}

function copyText(side) {
  const text = document.getElementById(`${side}-result`).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已複製！'));
}

// ════════════════════════════════════════════════════════
// 語音錄音 + Groq Whisper (verbose_json)
// ════════════════════════════════════════════════════════
function toggleMic(side) {
  if (!groqApiKey) { openSettings(); return; }

  // 若另一側正在錄音，先停掉
  if (state.recording && state.recording !== side) {
    forceStopRecording();
  }

  if (state.recording === side) {
    stopRecording();
  } else {
    startRecording(side);
  }
}

async function startRecording(side) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.audioChunks = [];

    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    state.mediaRecorder = new MediaRecorder(stream, { mimeType });

    state.mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) state.audioChunks.push(e.data);
    };

    state.mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const audioBlob = new Blob(state.audioChunks, { type: mimeType });
      await transcribeWithGroq(audioBlob, mimeType, side);
    };

    state.mediaRecorder.start();
    state.recording = side;

    document.getElementById(`${side}-mic-btn`).classList.add('listening');
    setStatus(side, '🔴 錄音中… 說完再按麥克風停止');
  } catch (err) {
    setStatus(side, '⚠️ 無法使用麥克風，請確認已授權');
  }
}

function stopRecording() {
  if (state.mediaRecorder && state.recording) {
    const side = state.recording;
    state.mediaRecorder.stop();
    state.recording = null;
    document.getElementById(`${side}-mic-btn`).classList.remove('listening');
    setStatus(side, '辨識中…');
  }
}

function forceStopRecording() {
  if (state.mediaRecorder && state.recording) {
    const side = state.recording;
    state.mediaRecorder.stop();
    state.recording = null;
    document.getElementById(`${side}-mic-btn`).classList.remove('listening');
    setStatus(side, '');
  }
}

async function transcribeWithGroq(audioBlob, mimeType, side) {
  const ext  = mimeType.includes('webm') ? 'webm' : 'mp4';
  const lang = LANG_LIST.find(l => l.code === (side === 'bottom' ? state.bottom.lang : state.top.lang));

  // 針對不同語言建構 prompt，提升辨識品質
  const promptMap = {
    zh: 'Taiwan Mandarin with mixed English, BDSM terminology: Dom, Sub, vers, bottom, top, Rigger, safeword, 不分, 繩縛, 調教, 臣服者, 支配者, 安全詞, 項圈',
    en: 'BDSM terminology: Dom, Sub, vers, bottom, top, Rigger, safeword, bondage, collar, impact play',
    ja: 'BDSMの用語: Dom, Sub, 攻め, 受け, 両刀, 縄師, 緊縛, 安全言葉, 調教, 首輪',
  };
  const whisperPrompt = promptMap[lang.code] || '';

  const formData = new FormData();
  formData.append('file', audioBlob, `audio.${ext}`);
  formData.append('model', 'whisper-large-v3-turbo');
  formData.append('language', lang.whisperCode);
  formData.append('response_format', 'verbose_json');  // ← 升級：取得段落斷句
  formData.append('timestamp_granularities[]', 'segment');
  formData.append('prompt', whisperPrompt);

  try {
    const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${groqApiKey}` },
      body: formData,
    });

    if (res.status === 401) {
      setStatus(side, '⚠️ API Key 錯誤，請重新設定');
      openSettings();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    // verbose_json 回傳 segments，每段已有標點斷句
    let finalText = '';
    if (data.segments && data.segments.length > 0) {
      finalText = data.segments.map(s => s.text.trim()).join(' ');
    } else {
      finalText = data.text || '';
    }

    const inputEl = document.getElementById(`${side}-input`);
    inputEl.value = finalText;
    autoResize(inputEl);
    setStatus(side, '');

    if (finalText) doTranslate(side);
  } catch (err) {
    setStatus(side, '⚠️ 辨識失敗，請確認網路');
  }
}

// 快捷短語
// ════════════════════════════════════════════════════════
function togglePhrases() {
  phrasesOpen = !phrasesOpen;
  const drawer = document.getElementById('phrases-drawer');
  drawer.classList.toggle('open', phrasesOpen);
  document.getElementById('app').classList.toggle('phrases-mode', phrasesOpen);
  document.getElementById('phrases-toggle').textContent = phrasesOpen ? '✕ 關閉' : '💬 常用短語';
}

function buildTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  Object.keys(PHRASES).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPhraseCategory = cat;
      renderPhrases(cat);
    };
    bar.appendChild(btn);
  });
}

function renderPhrases(cat) {
  const list = document.getElementById('phrases-list');
  list.innerHTML = '';
  const bottomLang = state.bottom.lang;
  const topLang    = state.top.lang;

  PHRASES[cat].forEach(phrase => {
    const card = document.createElement('div');
    card.className = 'phrase-card';

    // 主要顯示：底部使用者語言（自己那側）
    const myText  = phrase[bottomLang] || phrase.zh || '';
    // 翻譯顯示：頂部對方語言
    const theirText = phrase[topLang] || phrase.en || '';

    card.innerHTML = `
      <div class="phrase-en">${theirText}</div>
      <div class="phrase-zh">${myText}</div>
    `;
    card.onclick = () => {
      showResult('top', theirText);
      showToast('對方那側已顯示翻譯，可請對方直接閱讀');
      if (phrasesOpen) togglePhrases();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    list.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════
// 設定
// ════════════════════════════════════════════════════════
function openSettings() {
  document.getElementById('openai-key-input').value = openaiApiKey;
  document.getElementById('api-key-input').value    = groqApiKey;
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
function saveApiKey() {
  const oaiKey  = document.getElementById('openai-key-input').value.trim();
  const groqKey = document.getElementById('api-key-input').value.trim();

  // OpenAI Key 允許空白（fallback 至 Google）
  openaiApiKey = oaiKey;
  localStorage.setItem('openai_api_key', oaiKey);

  // Groq Key 仍需填寫（語音辨識用）
  if (!groqKey) { showToast('請填寫 Groq API Key（語音辨識需要）'); return; }
  groqApiKey = groqKey;
  localStorage.setItem('groq_api_key', groqKey);

  closeSettings();
  const engine = oaiKey ? 'GPT-4o-mini' : 'Google Translate';
  showToast(`已儲存 ✓　翻譯引擎：${engine}`);
}

// ════════════════════════════════════════════════════════
// UI 工具
// ════════════════════════════════════════════════════════
function setStatus(side, msg) {
  document.getElementById(`${side}-status`).textContent = msg;
}

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

function autoResize(el) {
  el.style.height = 'auto';
  const maxH = Math.round(window.innerHeight * 0.30);
  el.style.height = Math.min(el.scrollHeight, maxH) + 'px';
}

// Enter+Ctrl 翻譯（桌機）
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) doTranslate('bottom');
});
